name: Spring Boot CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-test-docker:

    runs-on: ubuntu-latest

    steps:

      # Get source code
      - name: Checkout Code
        uses: actions/checkout@v4


      # Setup Java
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'


      # Run Tests
      - name: Run Tests
        run: ./mvnw test


      # Build JAR
      - name: Build Application
        run: ./mvnw clean package


      # Build Docker Image
      - name: Build Docker Image
        run: docker build -t spring-boot-app .